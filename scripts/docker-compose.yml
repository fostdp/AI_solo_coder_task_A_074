version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lng_monitor
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ../scripts/init_timescaledb.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: lng_monitor
      MODBUS_HOST: simulator
      MODBUS_PORT: 5020
      OPCUA_ENDPOINT: opc.tcp://localhost:4840
      STATIC_DIR: /app/static
      HTTP_PORT: 8080
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - ../frontend/static:/app/static

  simulator:
    build:
      context: ../scripts
      dockerfile: Dockerfile.sim
    ports:
      - "5020:5020"

volumes:
  timescaledb_data:
