<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNG储罐翻滚预测与安全监控系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header id="app-header">
        <div class="header-left">
            <h1>LNG储罐翻滚预测与安全监控系统</h1>
            <span class="system-status" id="system-status">系统运行中</span>
        </div>
        <div class="header-right">
            <span id="current-time"></span>
            <span class="ws-status" id="ws-status">WS: 未连接</span>
            <span id="alarm-count-badge" style="display:none">告警 <span id="alarm-count">0</span></span>
        </div>
    </header>

    <main id="app-main">
        <nav id="tank-nav">
            <div class="nav-title">储罐选择</div>
            <div id="tank-buttons"></div>
            <div class="nav-section">
                <div class="nav-title">风险指数</div>
                <div id="risk-gauge-container">
                    <canvas id="risk-gauge" width="200" height="120"></canvas>
                </div>
            </div>
        </nav>

        <section id="tank-view">
            <div id="three-container">
                <canvas id="tank-3d"></canvas>
            </div>
            <div id="density-contour-container">
                <canvas id="density-contour-canvas" width="300" height="400"></canvas>
            </div>
        </section>

        <aside id="data-panel">
        </aside>
    </main>

    <div id="sensor-popup" class="popup hidden">
        <div class="popup-header">
            <span class="popup-title">传感器详情</span>
            <button class="popup-close" id="close-popup">&times;</button>
        </div>
        <div class="popup-body">
            <div class="popup-value" style="font-size:24px;color:#06b6d4;margin:10px 0;"></div>
            <canvas id="sensor-chart" width="280" height="160"></canvas>
        </div>
    </div>

    <div id="alarm-banner" class="alarm-banner hidden" style="display:none;"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/js/tank_3d_viewer.js"></script>
    <script src="/js/risk_dashboard.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
